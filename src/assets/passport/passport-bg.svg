<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
    <defs>
        <pattern id="dotGrid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="1" fill="#0f172a" fill-opacity="0.05"/>
        </pattern>
        <radialGradient id="glowA" cx="20%" cy="18%" r="55%">
            <stop offset="0%" stop-color="#c7d2fe" stop-opacity="0.35"/>
            <stop offset="60%" stop-color="#c7d2fe" stop-opacity="0.06"/>
            <stop offset="100%" stop-color="#c7d2fe" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="glowB" cx="82%" cy="86%" r="60%">
            <stop offset="0%" stop-color="#a7c4e6" stop-opacity="0.28"/>
            <stop offset="65%" stop-color="#a7c4e6" stop-opacity="0.05"/>
            <stop offset="100%" stop-color="#a7c4e6" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="baseWash" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#f8fafc"/>
            <stop offset="100%" stop-color="#eef2f7"/>
        </linearGradient>
    </defs>

    <rect width="1600" height="1000" fill="url(#baseWash)"/>
    <rect width="1600" height="1000" fill="url(#dotGrid)"/>
    <rect width="1600" height="1000" fill="url(#glowA)"/>
    <rect width="1600" height="1000" fill="url(#glowB)"/>
</svg>
