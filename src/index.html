<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title></title>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="force-rendering" content="webkit">
    <meta name="viewport" content="width=device-width, initial-scale=1,user-scalable=no">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <meta name="renderer" content="webkit">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="black">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#E7E9E8">
    <style>
        /* ── Preloader shell ─────────────────────────────────────────── */
        .preloader {
            --pl-c: #1890ff;          /* overridden by JS */
            position: fixed;
            inset: 0;
            background: #070c16;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: opacity .6s cubic-bezier(.4,0,.2,1);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display',
                         'PingFang SC', 'Helvetica Neue', sans-serif;
        }

        /* Ambient radial glow that breathes */
        .preloader::before {
            content: '';
            position: absolute;
            width: 560px;
            height: 560px;
            border-radius: 50%;
            background: radial-gradient(
                circle,
                color-mix(in srgb, var(--pl-c) 20%, transparent) 0%,
                transparent 68%
            );
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: plAmbient 4s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes plAmbient {
            0%, 100% { opacity: .55; transform: translate(-50%,-50%) scale(1);    }
            50%       { opacity: 1;   transform: translate(-50%,-50%) scale(1.18); }
        }

        /* ── Spinner ─────────────────────────────────────────────────── */
        .pl-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 38px;
        }

        .pl-spinner {
            position: relative;
            width: 96px;
            height: 96px;
        }

        /* Conic-gradient arcs – comet-tail sweep effect */
        .pl-arc {
            position: absolute;
            border-radius: 50%;
            will-change: transform;
        }

        /* Outer arc: wide sweep, primary color fading to transparent */
        .pl-arc-1 {
            inset: 0;
            background: conic-gradient(
                from 0deg,
                var(--pl-c)                               0%,
                color-mix(in srgb, var(--pl-c) 25%, transparent) 22%,
                transparent                              38%
            );
            mask:         radial-gradient(farthest-side, transparent 92.5%, black 93%);
            -webkit-mask: radial-gradient(farthest-side, transparent 92.5%, black 93%);
            animation: plCW 1.8s linear infinite;
        }

        /* Middle arc: white sweep, counter-clockwise */
        .pl-arc-2 {
            inset: 16px;
            background: conic-gradient(
                from 180deg,
                rgba(255,255,255,.88)  0%,
                rgba(255,255,255,.08) 18%,
                transparent           32%
            );
            mask:         radial-gradient(farthest-side, transparent 91%, black 92%);
            -webkit-mask: radial-gradient(farthest-side, transparent 91%, black 92%);
            animation: plCCW 2.8s linear infinite;
        }

        /* Inner arc: bright primary, fast clockwise */
        .pl-arc-3 {
            inset: 32px;
            background: conic-gradient(
                from 90deg,
                color-mix(in srgb, var(--pl-c) 95%, white) 0%,
                color-mix(in srgb, var(--pl-c) 12%, transparent) 28%,
                transparent 45%
            );
            mask:         radial-gradient(farthest-side, transparent 86%, black 87%);
            -webkit-mask: radial-gradient(farthest-side, transparent 86%, black 87%);
            animation: plCW 1.15s linear infinite;
        }

        @keyframes plCW  { to { transform: rotate( 360deg); } }
        @keyframes plCCW { to { transform: rotate(-360deg); } }

        /* Center orb */
        .pl-orb {
            position: absolute;
            inset: 43px;
            border-radius: 50%;
            background: var(--pl-c);
            box-shadow:
                0 0 10px var(--pl-c),
                0 0 28px color-mix(in srgb, var(--pl-c) 45%, transparent);
            animation: plOrbPulse 2.2s ease-in-out infinite;
            will-change: transform, opacity;
        }

        @keyframes plOrbPulse {
            0%, 100% { transform: scale(1);    opacity: 1;   }
            50%       { transform: scale(.42); opacity: .45; }
        }

        /* ── Brand label ─────────────────────────────────────────────── */
        .pl-brand {
            font-size: 11.5px;
            font-weight: 300;
            letter-spacing: .42em;
            text-transform: uppercase;
            color: rgba(255,255,255,.7);
            animation: plFadeUp .9s ease-out .25s both;
        }

        /* ── Bouncing dots ───────────────────────────────────────────── */
        .pl-dots {
            display: flex;
            gap: 9px;
            animation: plFadeUp .9s ease-out .45s both;
        }

        .pl-dots span {
            display: block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--pl-c);
            box-shadow: 0 0 7px var(--pl-c);
            animation: plDot 1.45s ease-in-out infinite;
            will-change: transform, opacity;
        }
        .pl-dots span:nth-child(2) { animation-delay: .19s; }
        .pl-dots span:nth-child(3) { animation-delay: .38s; }

        @keyframes plDot {
            0%, 80%, 100% { transform: scale(.38); opacity: .22; }
            40%            { transform: scale(1);   opacity: 1;   }
        }

        @keyframes plFadeUp {
            from { opacity: 0; transform: translateY(11px); }
            to   { opacity: 1; transform: translateY(0);    }
        }

        /* ── Angular hide/show hooks ─────────────────────────────────── */
        .preloader-hidden-add        { opacity: 1; display: flex; }
        .preloader-hidden-add-active { opacity: 0; }
        .preloader-hidden            { display: none; }

        /* ── Tip ─────────────────────────────────────────────────────── */
        @keyframes plTip {
            0%, 90% { opacity: 0; }
            100%    { opacity: 1; }
        }

        #preloader-tip {
            position: absolute;
            left: 0; right: 0; bottom: 24px;
            text-align: center;
            font-size: 11px;
            color: rgba(255,255,255,.22);
            letter-spacing: .025em;
            animation: plTip 8s ease-out;
        }

        /* ── Reduced motion ──────────────────────────────────────────── */
        @media (prefers-reduced-motion: reduce) {
            .pl-arc, .pl-orb, .pl-dots span, .preloader::before { animation: none; }
            .pl-brand, .pl-dots { animation: none; opacity: 1; transform: none; }
        }
    </style>
</head>
<body>
<div class="preloader">
    <div class="pl-content">
        <div class="pl-spinner">
            <div class="pl-arc pl-arc-1"></div>
            <div class="pl-arc pl-arc-2"></div>
            <div class="pl-arc pl-arc-3"></div>
            <div class="pl-orb"></div>
        </div>
        <div class="pl-brand" id="preload-brand">Loading</div>
        <div class="pl-dots"><span></span><span></span><span></span></div>
    </div>
    <div id="preloader-tip">Stuck? Press Ctrl + Shift + R to reload.</div>
</div>
<script>
    window.setTimeout(function () {
        if (!window.eruptWebSuccess) { location.reload(true); }
    }, 12000);
    (function (date) {
        var __t__ = '' + date.getFullYear() + date.getMonth() + date.getDate() + date.getHours() + date.getMinutes();
        document.write(
            "<link rel=\"stylesheet\" href=\"app.css?_=" + __t__ + "\" type=\"text/css\"/>" +
            "<script type=\"text/javascript\" src=\"app.js?_=" + __t__ + "\"><\/script>" +
            "<script type=\"module\" src=\"app.module.js?_=" + __t__ + "\" ><\/script>"
        );
        var _el = document.querySelector(".preloader");
        var _brandEl = document.getElementById("preload-brand");
        var _t = setInterval(function () {
            if (window.eruptSiteConfig !== undefined) {
                clearInterval(_t);
                if (window.eruptSiteConfig.theme && window.eruptSiteConfig.theme.primaryColor) {
                    _el.style.setProperty('--pl-c', window.eruptSiteConfig.theme.primaryColor);
                }
                if (_brandEl) {
                    _brandEl.textContent = window.eruptSiteConfig.logoText || window.eruptSiteConfig.title || "Loading";
                }
            }
        }, 10);
    })(new Date());
</script>

</body>
</html>
