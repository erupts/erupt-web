<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title></title>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="force-rendering" content="webkit">
    <meta name="viewport" content="width=device-width, initial-scale=1,user-scalable=no">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <meta name="renderer" content="webkit">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="black">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#E7E9E8">
    <style>
        .preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 9999;
            transition: opacity .5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .preloader::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 30% 40%, rgba(255,255,255,0.12) 0%, transparent 60%),
                        linear-gradient(160deg, rgba(255,255,255,0.06) 0%, rgba(0,0,0,0.18) 100%);
            pointer-events: none;
        }

        .pl-orb {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.07);
            animation: plOrbFloat ease-in-out infinite;
            will-change: transform;
        }
        .pl-orb-1 { width: 360px; height: 360px; top: -100px; right: -80px; animation-duration: 22s; }
        .pl-orb-2 { width: 220px; height: 220px; bottom: -60px; left: -50px; animation-duration: 28s; animation-delay: -6s; }
        .pl-orb-3 { width: 120px; height: 120px; top: 25%; left: 12%; animation-duration: 18s; animation-delay: -10s; opacity: 0.5; }
        .pl-orb-4 { width: 80px; height: 80px; bottom: 20%; right: 15%; animation-duration: 14s; animation-delay: -4s; opacity: 0.4; }

        @keyframes plOrbFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            33%       { transform: translateY(-18px) scale(1.03); }
            66%       { transform: translateY(10px) scale(0.97); }
        }

        .pl-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
        }

        .pl-spinner {
            position: relative;
            width: 80px;
            height: 80px;
        }

        .pl-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid transparent;
            will-change: transform;
        }

        .pl-ring-1 {
            inset: 0;
            border-top-color: rgba(255, 255, 255, 0.95);
            border-right-color: rgba(255, 255, 255, 0.2);
            animation: plSpin 1.1s linear infinite;
        }

        .pl-ring-2 {
            inset: 10px;
            border-top-color: rgba(255, 255, 255, 0.6);
            border-left-color: rgba(255, 255, 255, 0.15);
            animation: plSpin 1.7s linear infinite reverse;
        }

        .pl-ring-3 {
            inset: 20px;
            border-top-color: rgba(255, 255, 255, 0.8);
            border-bottom-color: rgba(255, 255, 255, 0.1);
            animation: plSpin 2.5s linear infinite;
        }

        .pl-dot {
            position: absolute;
            inset: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.5);
            animation: plDotPulse 2s ease-in-out infinite;
            will-change: transform, opacity;
        }

        @keyframes plSpin {
            to { transform: rotate(360deg); }
        }

        @keyframes plDotPulse {
            0%, 100% { opacity: 0.9; transform: scale(1); }
            50%       { opacity: 0.4; transform: scale(0.55); }
        }

        .pl-brand {
            color: rgba(255, 255, 255, 0.95);
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.06em;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            animation: plFadeUp .7s ease-out .2s both;
        }

        .pl-dots {
            display: flex;
            gap: 7px;
            animation: plFadeUp .7s ease-out .4s both;
        }

        .pl-dots span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.65);
            animation: plBounce 1.3s ease-in-out infinite;
            will-change: transform, opacity;
        }

        .pl-dots span:nth-child(2) { animation-delay: .15s; }
        .pl-dots span:nth-child(3) { animation-delay: .30s; }

        @keyframes plBounce {
            0%, 80%, 100% { transform: scale(0.55); opacity: 0.35; }
            40%            { transform: scale(1);    opacity: 1; }
        }

        @keyframes plFadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .preloader-hidden-add         { opacity: 1; display: flex; }
        .preloader-hidden-add-active  { opacity: 0; }
        .preloader-hidden             { display: none; }

        @keyframes tipFadeIn {
            0%, 88% { opacity: 0; }
            100%    { opacity: 1; }
        }

        #preloader-tip {
            text-align: center;
            color: rgba(255, 255, 255, 0.55);
            font-size: 12px;
            position: absolute;
            left: 0;
            right: 0;
            bottom: 24px;
            animation: tipFadeIn 6s;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            letter-spacing: 0.02em;
        }

        @media (prefers-reduced-motion: reduce) {
            .pl-orb, .pl-ring, .pl-dot, .pl-dots span { animation: none; }
            .pl-brand, .pl-dots { animation: none; opacity: 1; transform: none; }
        }
    </style>
</head>
<body>
<div class="preloader">
    <div class="pl-orb pl-orb-1"></div>
    <div class="pl-orb pl-orb-2"></div>
    <div class="pl-orb pl-orb-3"></div>
    <div class="pl-orb pl-orb-4"></div>
    <div class="pl-content">
        <div class="pl-spinner">
            <div class="pl-ring pl-ring-1"></div>
            <div class="pl-ring pl-ring-2"></div>
            <div class="pl-ring pl-ring-3"></div>
            <div class="pl-dot"></div>
        </div>
        <div class="pl-brand" id="preload-brand">Loading</div>
        <div class="pl-dots"><span></span><span></span><span></span></div>
    </div>
    <div id="preloader-tip">Stuck? Press Ctrl + Shift + R to reload.</div>
</div>
<script>
    window.setTimeout(function () {
        if (!window.eruptWebSuccess) {
            location.reload(true)
        }
    }, 1000 * 20);
    (function (date) {
        var __t__ = '' + date.getFullYear() + date.getMonth() + date.getDate() + date.getHours() + date.getMinutes();
        document.write(
            "<link rel=\"stylesheet\" href=\"app.css?_=" + __t__ + "\" type=\"text/css\"/>" +
            "<script type=\"text/javascript\" src=\"app.js?_=" + __t__ + "\"><\/script>" +
            "<script type=\"module\" src=\"app.module.js?_=" + __t__ + "\" ><\/script>"
        );
        var _preloaderEl = document.querySelector(".preloader");
        _preloaderEl.style.background = "#1677ff";
        var _brandEl = document.getElementById("preload-brand");
        var _colorCheckTimer = setInterval(function () {
            if (window.eruptSiteConfig !== undefined) {
                clearInterval(_colorCheckTimer);
                if (window.eruptSiteConfig.theme && window.eruptSiteConfig.theme.primaryColor) {
                    _preloaderEl.style.background = window.eruptSiteConfig.theme.primaryColor;
                }
                if (_brandEl) {
                    _brandEl.textContent = window.eruptSiteConfig.logoText || window.eruptSiteConfig.title || "Loading";
                }
            }
        }, 10);
    })(new Date())
</script>

</body>
</html>
