<div class="lp-page">

  <!-- 背景装饰层 -->
  <div class="lp-deco" aria-hidden="true"></div>

  <header class="lp-header">
    <div class="lp-header-brand">
      @if (logoPath) {
        <img class="lp-header-logo" [src]="logoPath" alt="logo">
      }
      @if (!logoPath) {
        <svg class="lp-header-icon" viewBox="0 0 36 36" fill="none">
          <rect width="15" height="15" rx="3" fill="currentColor"/>
          <rect x="21" width="15" height="15" rx="3" fill="currentColor" opacity="0.45"/>
          <rect y="21" width="15" height="15" rx="3" fill="currentColor" opacity="0.45"/>
          <rect x="21" y="21" width="15" height="15" rx="3" fill="currentColor" opacity="0.15"/>
        </svg>
      }
      <span class="lp-header-title">{{title}}</span>
    </div>

    <nav class="lp-header-nav">
      @if (copyright) {
        <a class="lp-nav-btn" href="https://github.com/erupts/erupt" target="_blank"
           nz-tooltip nzTooltipTitle="GitHub" nzTooltipPlacement="bottom">
          <i nz-icon nzType="github" nzTheme="outline"></i>
        </a>
        <div class="lp-nav-divider"></div>
      }
      <div class="lp-nav-lang">
        <i18n-choice></i18n-choice>
      </div>
    </nav>
  </header>

  <main class="lp-content">
    <div class="lp-card">
      <div class="lp-card-head">
        <router-outlet></router-outlet>
      </div>
    </div>

    @if (copyright) {
      <p class="lp-copyright">
        @if (copyrightTxt) {
          <span [innerHTML]="copyrightTxt"></span>
        }
        @if (!copyrightTxt) {
          &copy; 2018 – {{nowYear}}&nbsp;
          <a href="https://www.erupt.xyz" target="_blank">Erupt Engine</a>
        }
      </p>
    }
  </main>

</div>
