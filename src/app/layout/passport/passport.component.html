<div class="lp-page">

  <!-- 主区域 -->
  <div class="lp-side">
    <nav class="lp-side-nav">
      <!-- 移动端品牌名（左侧面板隐藏时出现） -->
      <div class="lp-side-brand">
        @if (logoPath) {
          <img class="lp-side-brand-img" [src]="logoPath" alt="logo">
        }
        @if (!logoPath) {
          <svg class="lp-side-brand-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="15" height="15" rx="3" fill="currentColor"/>
            <rect x="21" width="15" height="15" rx="3" fill="currentColor" opacity="0.45"/>
            <rect y="21" width="15" height="15" rx="3" fill="currentColor" opacity="0.45"/>
            <rect x="21" y="21" width="15" height="15" rx="3" fill="currentColor" opacity="0.15"/>
          </svg>
        }
        <span class="lp-side-brand-name">{{title}}</span>
      </div>
      <div class="lp-side-nav-actions">
        <a class="lp-nav-btn" (click)="toggleNeoBrutalist()" style="cursor:pointer"
           nz-tooltip nzTooltipTitle="Neo-Brutalist" nzTooltipPlacement="bottom">
          <i nz-icon nzType="bulb" [nzTheme]="neoBrutalist ? 'fill' : 'outline'"></i>
        </a>
        <div class="lp-nav-divider"></div>
        @if (copyright) {
          <a class="lp-nav-btn" href="https://github.com/erupts/erupt" target="_blank"
             nz-tooltip nzTooltipTitle="GitHub" nzTooltipPlacement="bottom">
            <i nz-icon nzType="github" nzTheme="outline"></i>
          </a>
          <div class="lp-nav-divider"></div>
        }
        <div class="lp-nav-lang">
          <i18n-choice></i18n-choice>
        </div>
      </div>
    </nav>

    <main class="lp-side-content">
      <div class="lp-card">
        <router-outlet></router-outlet>
      </div>
    </main>

    @if (copyright) {
      <p class="lp-copyright">
        @if (copyrightTxt) {
          <span [innerHTML]="copyrightTxt"></span>
        }
        @if (!copyrightTxt) {
          &copy; 2018 – {{nowYear}}&nbsp;
          <a href="https://www.erupt.xyz" target="_blank">Erupt Engine</a>
        }
      </p>
    }
  </div>

</div>
