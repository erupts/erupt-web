<erupt-node
    [(model)]="modelValue"
    [readonly]="readonly"
    [headerColor]="color()"
    [eruptBuild]="eruptBuild"
    (select)="onSelect()"
    (insertNode)="onInsertNode($event)"
    (insertFlexNode)="onInsertFlexNode($event)"
    (saveProp)="onSaveProp()"
    [progress]="progress"
    (delete)="onDelete()">
    办理人
    <div config>
        <nz-segmented [nzOptions]="[{value:0,label:'设置办理人'},{value:1,label:'表单权限'}]" [(ngModel)]="selectTab" style="margin-bottom: 12px">

        </nz-segmented>
        @if (selectTab == 0) {
            @for (reviewUserMode of assigneeNode.reviewUserModes; track reviewUserMode; let i = $index) {
                <nz-card nzTitle="办理人" nzSize="small" style="margin-bottom: 12px">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div style="flex: 1;">
                            <app-review-user [flowRule]="flowRule" [nodeId]="modelValue.id"
                                             [reviewUserMode]="reviewUserMode">
                            </app-review-user>
                        </div>
                        @if (assigneeNode.reviewUserModes.length > 1) {
                            <button
                                nz-button
                                nzType="text"
                                nzDanger
                                nzSize="small"
                                (click)="deleteReviewUser(i)"
                                style="margin-left: 8px;">
                                <span nz-icon nzType="delete" nzTheme="outline"></span>
                            </button>
                        }
                    </div>
                </nz-card>
            }
            <button nz-button style="margin-bottom: 12px" (click)="addReviewUsers()">
                <span nz-icon nzType="plus" nzTheme="outline"></span>
                添加办理人
            </button>

            <nz-divider style="margin: 12px 0"></nz-divider>
        }
        @if (selectTab == 1) {
            <app-form-access [eruptBuild]="eruptBuild" [formAccesses]="assigneeNode.formAccesses"/>
        }
    </div>
</erupt-node>
