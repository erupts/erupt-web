<erupt-node
    [(model)]="modelValue"
    [readonly]="readonly"
    [headerColor]="color()"
    [eruptBuild]="eruptBuild"
    (select)="onSelect()"
    (insertNode)="onInsertNode($event)"
    (insertFlexNode)="onInsertFlexNode($event)"
    (saveProp)="onSaveProp()"
    [progress]="progress"
    (delete)="onDelete()">
    {{ ccNode.reviewUserModes[0].mode || name() | translate }}
    <div config>
        <nz-segmented [nzOptions]="ccTabOptions" [(ngModel)]="selectTab" style="margin-bottom: 12px">

        </nz-segmented>
        @if (selectTab == 0) {
            @for (reviewUserMode of ccNode.reviewUserModes; track reviewUserMode; let i = $index) {
                <nz-card [nzTitle]="'flow.node.cc_label' | translate" nzSize="small" style="margin-bottom: 12px">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div style="flex: 1;">
                            <app-review-user [reviewUserMode]="reviewUserMode" [flowRule]="flowRule" [nodeId]="modelValue.id">
                            </app-review-user>
                        </div>
                        @if (ccNode.reviewUserModes.length > 1) {
                            <button
                                nz-button
                                nzType="text"
                                nzDanger
                                nzSize="small"
                                (click)="deleteReviewUser(i)"
                                [nz-tooltip]="'flow.node.delete_approver' | translate"
                                style="margin-left: 8px;">
                                <span nz-icon nzType="delete" nzTheme="outline"></span>
                            </button>
                        }
                    </div>
                </nz-card>
            }
            <button nz-button style="margin-bottom: 12px" (click)="addReviewUsers()">
                <span nz-icon nzType="plus" nzTheme="outline"></span>
                {{ 'flow.node.add_cc' | translate }}
            </button>
        }
        @if (selectTab == 1) {
            <app-form-access [eruptBuild]="eruptBuild" [formAccesses]="ccNode.formAccesses" [nodeType]="NodeType.CC"/>
        }
    </div>
</erupt-node>
