<div style="display: flex;gap: 6px;flex-direction: row;flex-wrap: wrap;">
    @for (scope of upmsScopes; track scope) {
        <nz-tag [nzColor]="getScopeTagColor(scope.scope)" nz-tooltip style="margin-right: 0;cursor: pointer"
                nzMode="closeable" (nzOnClose)="removeScope($event, scope)" (click)="changeSubmitPermission(FlowPermission.SPECIFIC)">
            <span nz-icon [nzType]="getScopeIcon(scope.scope)" nzTheme="outline"></span>
            <span class="tag-text">{{ getScopeValue(scope) }}</span>
        </nz-tag>
    }
    <button nz-button nzType="default" nzSize="small" (click)="changeSubmitPermission(FlowPermission.SPECIFIC)">
        <i nz-icon nzType="plus" nzTheme="outline"></i>
    </button>
</div>
