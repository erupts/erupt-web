<div class="flow" [class.fullscreen]="isFullscreen">
    <div class="operation">
        @if (progress) {
            <div style="zoom: .6">
                @for (ft of FlowTurn | enumToArray; track ft) {
                    <div [ngClass]="ft" style="padding: 6px;margin-bottom: 16px">
                        {{ ft | translate }}
                    </div>
                }
            </div>
        }
        <div class="operation-zoom">
            <button nz-button nzSize="small" (click)="doZoom(-1)" [title]="'flow.zoom.zoom_out' | translate">
                <span nz-icon nzType="minus"></span>
            </button>
            <span class="zoom-text" (click)="resetZoom()" style="cursor: pointer" [title]="'flow.zoom.reset' | translate">{{ (scale * 100) | number:'1.0-0' }}%</span>
            <button nz-button nzSize="small" (click)="doHit()" [title]="'flow.zoom.fit' | translate">
                <span nz-icon nzType="aim"></span>
            </button>
            <button nz-button nzSize="small" (click)="doZoom(1)" [title]="'flow.zoom.zoom_in' | translate">
                <span nz-icon nzType="plus"></span>
            </button>
            <nz-divider nzType="vertical"></nz-divider>
            <button nz-button nzSize="small" (click)="showGrid = !showGrid" [title]="showGrid ? ('flow.grid.hide' | translate) : ('flow.grid.show' | translate)">
                <span nz-icon [nzType]="showGrid ? 'border-inner' : 'border-outer'"></span>
            </button>
            <button nz-button nzSize="small" (click)="toggleFullscreen()" [title]="isFullscreen ? ('bi.exit_fullscreen' | translate) : ('global.fullscreen' | translate)">
                <span nz-icon [nzType]="isFullscreen ? 'fullscreen-exit' : 'fullscreen'"></span>
            </button>
        </div>
    </div>
    <div #canvasContainer class="canvas-container" [class.grid-bg]="showGrid" style="width: 100%;height: 100%;position: relative;">
        <div class="process" id="flow-canvas">
            @for (node of modelValue; track node; let i = $index) {
                <app-recursive-node
                    #node
                    [readonly]="readonly"
                    [flowRule]="modelValue"
                    [eruptBuild]="eruptBuild"
                    [node]="node"
                    [branch]="modelValue"
                    [progress]="progress"
                    [index]="i"
                    (nodeChange)="modelValue[i] = $event; modelValueChange.emit(modelValue)"
                    (select)="selectNode($event)">
                </app-recursive-node>
            }
        </div>
    </div>
</div>
