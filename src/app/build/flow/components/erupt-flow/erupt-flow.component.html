<div class="flow" [class.fullscreen]="isFullscreen">
  <div class="operation">
    @if (progress) {
      <div style="zoom: .6">
        @for (ft of FlowTurn | enumToArray; track ft) {
          <div [ngClass]="ft" style="padding: 6px;margin-bottom: 16px">
            {{ft | translate}}
          </div>
        }
      </div>
    }
    <div class="operation-zoom">
      <button nz-button nzSize="small" (click)="doZoom(-1)" title="缩小 (Ctrl + -)">
        <span nz-icon nzType="minus"></span>
      </button>
      <span class="zoom-text">{{ (scale * 100) | number:'1.0-0' }}%</span>
      <button nz-button nzSize="small" (click)="doHit()" title="自适应视图 (Ctrl + 0)">
        <span nz-icon nzType="aim"></span>
      </button>
      <button nz-button nzSize="small" (click)="doZoom(1)" title="放大 (Ctrl + +)">
        <span nz-icon nzType="plus"></span>
      </button>
      <button nz-button nzSize="small" (click)="toggleFullscreen()" [title]="isFullscreen ? '退出全屏' : '全屏'">
        <span nz-icon [nzType]="isFullscreen ? 'fullscreen-exit' : 'fullscreen'"></span>
      </button>
    </div>
  </div>
  <div #canvasContainer class="canvas-container" style="width: 100%;height: 100%;position: relative;">
    <div class="process" id="flow-canvas">
      @for (node of modelValue; track node; let i = $index) {
        <app-recursive-node
          #node
          [readonly]="readonly"
          [eruptBuild]="eruptBuild"
          [node]="node"
          [branch]="modelValue"
          [progress]="progress"
          [index]="i"
          (nodeChange)="modelValue[i] = $event; modelValueChange.emit(modelValue)"
          (select)="selectNode($event)">
        </app-recursive-node>
      }
    </div>
  </div>
</div>
