<nz-spin [nzSpinning]="loading">
  <div [hidden]="readonly" class="search-container" style="">
    <input nz-input [value]="viewValue" [nzAutocomplete]="auto" [placeholder]="'global.keyword'|translate"
      nzSize="default"
      style="width: 300px" #tipInput [disabled]="!loaded" (blur)="blur()"/> &nbsp;
      <button nz-button nzType="default" [disabled]="!loaded" id="mapOk">&nbsp; {{"global.ok"|translate}} &nbsp;
      </button>
      <button nz-button [nzType]="pointSelectMode ? 'primary' : 'default'" [disabled]="!loaded"
        style="padding: 4px 10px" nz-tooltip [nzTooltipTitle]="pointSelectMode ? '关闭点选' : '点击地图选点'"
        (click)="togglePointSelect()"><i nz-icon nzType="aim" nzTheme="outline"></i>
      </button>
      @if (value) {
        <button nz-button nzType="default" nzDanger [disabled]="!loaded" style="padding: 4px 10px"
          class="mb-sm"
          (click)="clearLocation()"><i nz-icon nzType="close" nzTheme="outline"></i>
        </button>
      }
    </div>

    <nz-autocomplete #auto>
      @for (auto of autocompleteList; track auto) {
        <nz-auto-option
          [nzValue]="auto" (click)="choiceList(auto)"
          [nzLabel]="auto.name">{{auto.name}}
        </nz-auto-option>
      }
    </nz-autocomplete>
    <div id="amap" tabindex="0" style="min-height: 550px;border: 1px solid #d9d9d9;outline: none;border-radius: 4px">

    </div>
