<nz-spin [nzSpinning]="loading">
  <div style="width: 100%;max-height: 305px;overflow: auto">
    <div nz-row>
      @for (c of checkbox; track c) {
        <div nz-col [nzXs]="12" [nzSm]="8" [nzMd]="8" [nzLg]="4">
          <label nz-checkbox [nzDisabled]="onlyRead"
            nz-tooltip [nzTooltipTitle]="c.remark" [title]="c.label"
          [nzChecked]="edit.$value&&edit.$value.indexOf(c.id)!=-1"
          (nzCheckedChange)="onCheckChange(c.id, $event)">{{ c.label }}</label>
        </div>
      }
    </div>
  </div>
  @if (!checkbox || !checkbox.length) {
    <nz-empty [nzNotFoundImage]="'simple'" [nzNotFoundContent]="null">
    </nz-empty>
  }
</nz-spin>
