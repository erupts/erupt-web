<div>
  <nz-spin [nzSpinning]="loading">
    <nz-input-group [nzSuffix]="suffixIcon" class="mb-sm">
      <input type="text" nz-input [placeholder]="'tree.search'|translate"
        [(ngModel)]="eruptFieldModel.eruptFieldJson.edit.$tempValue">
    </nz-input-group>
    <ng-template #suffixIcon>
      @if (eruptFieldModel.eruptFieldJson.edit.$value?.length) {
        <span style="font-size:12px;color:#9ca3af;margin-right:4px;">{{ eruptFieldModel.eruptFieldJson.edit.$value.length }}</span>
      }
      <i nz-icon nzType="search"></i>
    </ng-template>
    @if (treeData) {
      <nz-tree style="max-height: 420px;overflow: auto"
        [nzCheckable]="true"
        [nzShowLine]="true"
        [nzVirtualHeight]="dataLength > 50 ? '420px' : null"
        [nzCheckStrictly]="true"
        [nzData]="treeData"
        (nzCheckboxChange)="checkBoxChange($event)"
        [nzSearchValue]="eruptFieldModel.eruptFieldJson.edit.$tempValue"
        [nzCheckedKeys]="arrayAnyToString(eruptFieldModel.eruptFieldJson.edit.$value)">
      </nz-tree>
    }
  </nz-spin>
</div>
