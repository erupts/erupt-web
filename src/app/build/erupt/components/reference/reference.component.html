<nz-input-group [nzSize]="size" class="erupt-input" [nzAddOnAfter]="readonly?null:refBtn">
    <input nz-input [nzSize]="size"
           autocomplete="off"
           [required]="field.eruptFieldJson.edit.notNull"
           (click)="!readonly && createReferenceModal(field)"
           (keydown)="onInputKeydown($event, field)"
           readonly
           [style.cursor]="readonly ? 'not-allowed' : 'pointer'"
           [disabled]="readonly"
           [placeholder]="field.eruptFieldJson.edit.placeHolder"
           [ngModel]="getDisplayValue(field)"
           [name]="field.fieldName">
</nz-input-group>
<ng-template #refBtn>
    @if (field.eruptFieldJson.edit.$value) {
        <i nz-icon nzType="close-circle" theme="fill" class="point" (click)="clearReferValue(field)"></i>
    }
    @if (!field.eruptFieldJson.edit.$value) {
        <i nz-icon (click)="createReferenceModal(field)" nzType="database" theme="fill" class="point"></i>
    }
</ng-template>
