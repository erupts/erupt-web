<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            background: #fff;
            background-image:
                radial-gradient(900px 480px at 78% -10%, rgba(22, 119, 255, .045), transparent 60%),
                radial-gradient(700px 420px at 6% 110%, rgba(22, 119, 255, .028), transparent 60%);
            overflow: hidden;
        }

        @keyframes fade-in { to { opacity: 1; } }
        @keyframes rise { to { opacity: 1; transform: none; } }
        .ent {
            opacity: 0;
            transform: translateY(8px);
            animation: rise .9s cubic-bezier(.22, 1, .36, 1) forwards;
        }

        /* ================= structural hairlines ================= */
        .line {
            position: fixed;
            background: rgba(0, 0, 0, .1);
        }
        .h {
            height: 1px;
            transform: scaleX(0);
            transform-origin: left center;
            animation: grow-x 1s cubic-bezier(.4, 0, .2, 1) forwards;
        }
        .v {
            width: 1px;
            transform: scaleY(0);
            transform-origin: center top;
            animation: grow-y 1s cubic-bezier(.4, 0, .2, 1) forwards;
        }
        @keyframes grow-x { to { transform: scaleX(1); } }
        @keyframes grow-y { to { transform: scaleY(1); } }

        .h1 { top: 14%; left: 0; right: 0; animation-delay: .15s; }
        .hv1 { left: 25%; top: 0; height: 14%; animation-delay: .35s; }
        .hv2 { left: 50%; top: 0; height: 14%; animation-delay: .45s; }
        .hv3 { left: 75%; top: 0; height: 14%; animation-delay: .55s; }
        .vm { left: 62%; top: 14%; bottom: 0; animation-delay: .45s; }
        .h2 { top: 87%; left: 62%; right: 0; animation-delay: .85s; }

        /* right side reads as a drawer panel */
        .drawer {
            position: fixed;
            left: 62%; top: 14%; right: 0; bottom: 0;
            background: #fff;
            box-shadow: -28px 0 56px -40px rgba(15, 43, 92, .16);
            opacity: 0;
            animation: fade-in 1.2s ease .9s forwards;
            pointer-events: none;
        }

        .cross {
            position: fixed;
            width: 15px; height: 15px;
            margin: -7px 0 0 -7px;
            opacity: 0;
            animation: fade-in .7s ease 1.4s forwards;
        }
        .cross::before, .cross::after {
            content: "";
            position: absolute;
            background: rgba(22, 119, 255, .55);
        }
        .cross::before { left: 0; top: 7px; width: 15px; height: 1px; }
        .cross::after  { left: 7px; top: 0; width: 1px; height: 15px; }
        .x1 { left: 62%; top: 14%; }
        .x2 { left: 62%; top: 87%; animation-delay: 1.7s; }
        .x2::before, .x2::after { background: rgba(15, 35, 95, .18); }

        /* light glide along the header line */
        .glide {
            position: fixed;
            top: calc(14% - 1px);
            left: 0;
            width: 200px; height: 1px;
            background: linear-gradient(90deg,
                transparent, rgba(22, 119, 255, .55) 50%, transparent);
            box-shadow: 0 0 8px rgba(22, 119, 255, .25);
            opacity: 0;
            animation: slide 18s linear 3s infinite;
        }
        @keyframes slide {
            0%   { transform: translateX(-200px); opacity: 0; }
            4%   { opacity: 1; }
            42%  { opacity: 1; }
            46%  { transform: translateX(100vw); opacity: 0; }
            100% { transform: translateX(100vw); opacity: 0; }
        }
        .glide-v {
            position: fixed;
            left: calc(62% - 1px);
            top: 14%;
            width: 1px; height: 150px;
            background: linear-gradient(180deg,
                transparent, rgba(22, 119, 255, .45) 50%, transparent);
            box-shadow: 0 0 8px rgba(22, 119, 255, .2);
            opacity: 0;
            animation: slide-v 22s linear 12s infinite;
        }
        @keyframes slide-v {
            0%   { transform: translateY(-150px); opacity: 0; }
            4%   { opacity: 1; }
            42%  { opacity: 1; }
            46%  { transform: translateY(86vh); opacity: 0; }
            100% { transform: translateY(86vh); opacity: 0; }
        }

        /* ================= KPI band ================= */
        .kpi {
            position: fixed;
            top: calc(7% - 22px);
            width: 25%;
            height: 44px;
        }
        .kpi .klabel {
            position: relative;
            width: 34px; height: 4px;
            border-radius: 2px;
            margin-left: 14%;
            background: rgba(15, 35, 95, .09);
        }
        .kpi .kvalue {
            height: 11px;
            border-radius: 5.5px;
            margin: 12px 0 0 14%;
            background: linear-gradient(90deg, rgba(15, 35, 95, .13), rgba(15, 35, 95, .07));
        }
        .kpi .kspark {
            position: absolute;
            right: 16%; bottom: 2px;
            display: flex;
            align-items: flex-end;
            gap: 3px;
        }
        .kpi .kspark i {
            display: block;
            width: 4px;
            border-radius: 2px 2px 1px 1px;
            background: rgba(15, 35, 95, .08);
        }
        .kpi .kspark i:nth-child(1) { height: 7px; }
        .kpi .kspark i:nth-child(2) { height: 12px; }
        .kpi .kspark i:nth-child(3) { height: 9px; }
        .kpi .kspark i:nth-child(4) { height: 15px; }
        .kpi3 .kspark i:nth-child(2) { height: 9px; }
        .kpi3 .kspark i:nth-child(4) { height: 11px; }
        .kpi4 .kspark i:nth-child(1) { height: 11px; }
        .kpi4 .kspark i:nth-child(4) { height: 8px; }

        /* lit cell */
        .kpi.lit .klabel::after {
            content: "";
            position: absolute;
            right: -12px; top: -1px;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: rgba(22, 119, 255, .65);
            animation: dot-pulse 4.5s ease-out 3s infinite;
        }
        @keyframes dot-pulse {
            0%   { box-shadow: 0 0 0 0 rgba(22, 119, 255, .3); }
            20%  { box-shadow: 0 0 0 6px rgba(22, 119, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(22, 119, 255, 0); }
        }
        .kpi.lit .kvalue {
            background: linear-gradient(90deg, rgba(22, 119, 255, .42), rgba(22, 119, 255, .10));
        }
        .kpi.lit .kspark i { background: rgba(22, 119, 255, .25); }
        .kpi.lit .kspark i:nth-child(4) { background: rgba(22, 119, 255, .55); }
        .kpi.lit .kspark i {
            transform-origin: bottom center;
            animation: spark 6s ease-in-out 3.5s infinite;
        }
        .kpi.lit .kspark i:nth-child(2) { animation-delay: 4s; }
        .kpi.lit .kspark i:nth-child(3) { animation-delay: 4.5s; }
        .kpi.lit .kspark i:nth-child(4) { animation-delay: 5s; }
        @keyframes spark {
            0%, 100% { transform: scaleY(1); }
            50%      { transform: scaleY(.72); }
        }

        .kpi1 { left: 0;   animation-delay: .8s; }   .kpi1 .kvalue { width: 30%; }
        .kpi2 { left: 25%; animation-delay: .95s; }  .kpi2 .kvalue { width: 38%; }
        .kpi3 { left: 50%; animation-delay: 1.1s; }  .kpi3 .kvalue { width: 24%; }
        .kpi4 { left: 75%; animation-delay: 1.25s; } .kpi4 .kvalue { width: 33%; }

        /* ================= dynamic table ================= */
        .table {
            position: fixed;
            left: 4%; top: 19%;
            width: 54%;
            overflow: hidden;
            border: 1px solid rgba(15, 35, 95, .10);
            border-radius: 12px;
            background: #fff;
            box-shadow:
                0 1px 2px rgba(15, 43, 92, .04),
                0 18px 44px -28px rgba(15, 43, 92, .20);
            animation-delay: 1.2s;
        }
        .thead {
            position: relative;
            height: 32px;
            background: linear-gradient(180deg, rgba(15, 35, 95, .035), rgba(15, 35, 95, .018));
            border-bottom: 1px solid rgba(15, 35, 95, .09);
        }
        /* sort caret next to the first header cell */
        .thead .sort {
            position: absolute;
            left: calc(5% + 34px); top: 10px;
            width: 0; height: 0;
            border-left: 3.5px solid transparent;
            border-right: 3.5px solid transparent;
            border-bottom: 4.5px solid rgba(22, 119, 255, .55);
        }
        .thead .sort::after {
            content: "";
            position: absolute;
            left: -3.5px; top: 7px;
            width: 0; height: 0;
            border-left: 3.5px solid transparent;
            border-right: 3.5px solid transparent;
            border-top: 4.5px solid rgba(15, 35, 95, .18);
        }
        .trow {
            position: relative;
            height: 32px;
            border-bottom: 1px solid rgba(15, 35, 95, .05);
            opacity: 0;
            animation: fade-in .6s ease forwards;
        }
        .trow:last-of-type { border-bottom: none; }
        .trow:nth-child(even) { background: rgba(15, 35, 95, .014); }
        .trow:nth-child(2) { animation-delay: 1.5s; }
        .trow:nth-child(3) { animation-delay: 1.62s; }
        .trow:nth-child(4) { animation-delay: 1.74s; }
        .trow:nth-child(5) { animation-delay: 1.86s; }
        .trow:nth-child(6) { animation-delay: 1.98s; }
        .trow:nth-child(7) { animation-delay: 2.1s; }
        .trow:nth-child(8) { animation-delay: 2.22s; }
        .trow:nth-child(9) { animation-delay: 2.34s; }

        /* checkbox */
        .cb {
            position: absolute;
            left: 12px; top: 10px;
            width: 11px; height: 11px;
            border: 1px solid rgba(15, 35, 95, .20);
            border-radius: 3px;
            background: #fff;
        }
        .cb.on {
            background: rgba(22, 119, 255, .75);
            border-color: rgba(22, 119, 255, .75);
        }
        .cb.on::before {
            content: "";
            position: absolute;
            left: 2.5px; top: 1px;
            width: 3px; height: 6px;
            border: solid #fff;
            border-width: 0 1.5px 1.5px 0;
            transform: rotate(45deg);
        }

        /* skeleton cells */
        .cell {
            position: absolute;
            top: 14px;
            height: 5px;
            border-radius: 2.5px;
            background: rgba(15, 35, 95, .065);
        }
        .thead .cell { background: rgba(15, 35, 95, .11); top: 13px; }
        .cc1 { left: 5%;  width: 26px; }
        .cc2 { left: 16%; width: 15%; }
        .trow .cc2 { left: calc(16% + 24px); }
        .cc3 { left: 42%; width: 10%; }
        .cc4 { left: 58%; width: 30px; }
        .cc5 { left: auto; right: 16px; width: 46px; }
        .trow:nth-child(odd)  .cc2 { width: 11%; }
        .trow:nth-child(even) .cc1 { width: 20px; }

        /* avatar circle */
        .ava {
            position: absolute;
            left: 16%; top: 8px;
            width: 16px; height: 16px;
            border-radius: 50%;
            border: 1px solid rgba(15, 35, 95, .13);
            background: linear-gradient(135deg, rgba(15, 35, 95, .07), rgba(15, 35, 95, .03));
        }
        .trow:first-of-type .ava,
        .trow:nth-child(5) .ava {
            border-color: rgba(22, 119, 255, .4);
            background: linear-gradient(135deg, rgba(22, 119, 255, .16), rgba(22, 119, 255, .06));
        }

        /* tag pill with status dot */
        .pill {
            position: absolute;
            left: 42%; top: 9px;
            width: 38px; height: 15px;
            border-radius: 8px;
            border: 1px solid rgba(22, 119, 255, .35);
            background: rgba(22, 119, 255, .07);
        }
        .pill::before {
            content: "";
            position: absolute;
            left: 6px; top: 5px;
            width: 5px; height: 5px;
            border-radius: 50%;
            background: rgba(22, 119, 255, .55);
        }
        .pill::after {
            content: "";
            position: absolute;
            left: 15px; top: 6px;
            width: 15px; height: 3px;
            border-radius: 1.5px;
            background: rgba(22, 119, 255, .30);
        }
        .pill.grey {
            border-color: rgba(15, 35, 95, .13);
            background: rgba(15, 35, 95, .025);
        }
        .pill.grey::before { background: rgba(15, 35, 95, .22); }
        .pill.grey::after  { background: rgba(15, 35, 95, .12); }

        /* progress column */
        .prog {
            position: absolute;
            left: 58%; top: 14px;
            width: 16%; height: 5px;
            border-radius: 2.5px;
            background: rgba(15, 35, 95, .055);
            overflow: hidden;
        }
        .prog::before {
            content: "";
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: var(--p, 50%);
            border-radius: 2.5px;
            background: linear-gradient(90deg, rgba(22, 119, 255, .30), rgba(22, 119, 255, .50));
            transform: scaleX(0);
            transform-origin: left center;
            animation: prog-in 1s cubic-bezier(.4, 0, .2, 1) 2.6s forwards;
        }
        @keyframes prog-in { to { transform: scaleX(1); } }

        /* action bars: edit (blue) / delete (red) */
        .act, .act2 {
            position: absolute;
            top: 14px;
            height: 4px;
            border-radius: 2px;
            background: rgba(22, 119, 255, .45);
        }
        .act  { right: 44px; width: 18px; }
        .act2 { right: 16px; width: 18px; background: rgba(255, 77, 79, .30); }

        /* roving row highlight */
        .rover {
            position: absolute;
            left: 0; right: 0;
            height: 32px;
            background: rgba(22, 119, 255, .045);
            box-shadow: inset 2px 0 0 rgba(22, 119, 255, .35);
            opacity: 0;
            animation: rove 18s ease-in-out 3s infinite;
            pointer-events: none;
        }
        @keyframes rove {
            0%          { top: 33px;  opacity: 0; }
            2%, 10.5%   { top: 33px;  opacity: 1; }
            13%, 21.5%  { top: 65px;  opacity: 1; }
            24%, 32.5%  { top: 97px;  opacity: 1; }
            35%, 43.5%  { top: 129px; opacity: 1; }
            46%, 54.5%  { top: 161px; opacity: 1; }
            57%, 65.5%  { top: 193px; opacity: 1; }
            68%, 76.5%  { top: 225px; opacity: 1; }
            79%, 94%    { top: 257px; opacity: 1; }
            97%, 100%   { top: 257px; opacity: 0; }
        }

        /* pagination */
        .pager {
            position: fixed;
            left: 4%; width: 54%;
            top: calc(19% + 306px);
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            animation-delay: 2.6s;
        }
        .pager s {
            display: block;
            width: 22px; height: 22px;
            border: 1px solid rgba(15, 35, 95, .13);
            border-radius: 6px;
            background: #fff;
            box-shadow: 0 1px 2px rgba(15, 43, 92, .04);
            position: relative;
        }
        .pager s::before {
            content: "";
            position: absolute;
            left: 50%; top: 50%;
            width: 8px; height: 4px;
            margin: -2px 0 0 -4px;
            border-radius: 2px;
            background: rgba(15, 35, 95, .09);
        }
        .pager s.on {
            border-color: rgba(22, 119, 255, .6);
            background: rgba(22, 119, 255, .06);
        }
        .pager s.on::before { background: rgba(22, 119, 255, .45); }

        /* ================= dynamic form ================= */
        .field {
            position: fixed;
            left: 66%; right: 4%;
        }
        .field .label {
            width: 52px; height: 5px;
            border-radius: 2.5px;
            background: rgba(15, 35, 95, .11);
            margin-bottom: 9px;
        }
        .field .label.req::after {
            content: "";
            display: inline-block;
            position: relative;
            top: -4px; left: 58px;
            width: 4px; height: 4px;
            border-radius: 50%;
            background: rgba(255, 77, 79, .5);
        }
        .field .box {
            position: relative;
            height: 34px;
            border: 1px solid rgba(15, 35, 95, .14);
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 1px 2px rgba(15, 43, 92, .04);
        }
        .field .box .ph {
            position: absolute;
            left: 11px; top: 15px;
            width: 38%; height: 4px;
            border-radius: 2px;
            background: rgba(15, 35, 95, .055);
        }

        .f1 { top: 20%; animation-delay: 1.6s; }
        .f2 { top: 34%; animation-delay: 1.8s; }
        .f3 { top: 48%; animation-delay: 2s; }
        .f4 { top: 62%; animation-delay: 2.2s; }

        /* focused input with blinking caret */
        .f2 .box {
            border-color: rgba(22, 119, 255, .55);
            box-shadow: 0 0 0 3px rgba(22, 119, 255, .08), 0 1px 2px rgba(15, 43, 92, .04);
        }
        .caret {
            position: absolute;
            left: 11px; top: 9px;
            width: 1.5px; height: 15px;
            background: rgba(22, 119, 255, .8);
            animation: blink 1.1s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0; }
        }

        /* select chevron */
        .chev {
            position: absolute;
            right: 13px; top: 12px;
            width: 7px; height: 7px;
            border-right: 1.5px solid rgba(15, 35, 95, .28);
            border-bottom: 1.5px solid rgba(15, 35, 95, .28);
            transform: rotate(45deg);
        }

        /* switch + radios row */
        .f4 .controls {
            display: flex;
            align-items: center;
            gap: 22px;
        }
        .switch {
            position: relative;
            width: 34px; height: 18px;
            border-radius: 9px;
            background: rgba(15, 35, 95, .16);
            animation: sw-bg 8s ease-in-out 4s infinite;
        }
        .switch::before {
            content: "";
            position: absolute;
            left: 2px; top: 2px;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 1px 3px rgba(15, 43, 92, .25);
            animation: sw-knob 8s ease-in-out 4s infinite;
        }
        @keyframes sw-bg {
            0%, 40%, 100% { background: rgba(15, 35, 95, .16); }
            50%, 90%      { background: rgba(22, 119, 255, .65); }
        }
        @keyframes sw-knob {
            0%, 40%, 100% { transform: translateX(0); }
            50%, 90%      { transform: translateX(16px); }
        }
        .radio {
            width: 14px; height: 14px;
            border-radius: 50%;
            border: 1px solid rgba(15, 35, 95, .20);
            background: #fff;
        }
        .radio.on {
            border: 4px solid rgba(22, 119, 255, .7);
        }

        /* drawer footer buttons */
        .fbtns {
            position: fixed;
            right: 4%; top: calc(93.5% - 13px);
            display: flex;
            gap: 10px;
            animation-delay: 2.5s;
        }
        .fbtns .primary {
            position: relative;
            width: 62px; height: 26px;
            border-radius: 7px;
            background: linear-gradient(180deg, rgba(22, 119, 255, .68), rgba(22, 119, 255, .52));
            box-shadow: 0 4px 12px -4px rgba(22, 119, 255, .40);
            animation: btn-breathe 6s ease-in-out 3.5s infinite;
        }
        @keyframes btn-breathe {
            0%, 100% { box-shadow: 0 4px 12px -4px rgba(22, 119, 255, .40), 0 0 0 0 rgba(22, 119, 255, .18); }
            50%      { box-shadow: 0 4px 12px -4px rgba(22, 119, 255, .40), 0 0 0 5px rgba(22, 119, 255, 0); }
        }
        .fbtns .primary::before {
            content: "";
            position: absolute;
            left: 50%; top: 11px;
            width: 26px; height: 4px;
            margin-left: -13px;
            border-radius: 2px;
            background: rgba(255, 255, 255, .85);
        }
        .fbtns .plain {
            position: relative;
            width: 62px; height: 26px;
            border-radius: 7px;
            border: 1px solid rgba(15, 35, 95, .14);
            background: #fff;
            box-shadow: 0 1px 2px rgba(15, 43, 92, .04);
        }
        .fbtns .plain::before {
            content: "";
            position: absolute;
            left: 50%; top: 11px;
            width: 22px; height: 4px;
            margin-left: -11px;
            border-radius: 2px;
            background: rgba(15, 35, 95, .09);
        }
    </style>
</head>
<body>
    <!-- frame -->
    <div class="drawer"></div>
    <div class="line h h1"></div>
    <div class="line v hv1"></div>
    <div class="line v hv2"></div>
    <div class="line v hv3"></div>
    <div class="line v vm"></div>
    <div class="line h h2"></div>
    <span class="cross x1"></span>
    <span class="cross x2"></span>
    <div class="glide"></div>
    <div class="glide-v"></div>

    <!-- KPI band -->
    <div class="kpi kpi1 ent lit">
        <div class="klabel"></div><div class="kvalue"></div>
        <div class="kspark"><i></i><i></i><i></i><i></i></div>
    </div>
    <div class="kpi kpi2 ent">
        <div class="klabel"></div><div class="kvalue"></div>
        <div class="kspark"><i></i><i></i><i></i><i></i></div>
    </div>
    <div class="kpi kpi3 ent">
        <div class="klabel"></div><div class="kvalue"></div>
        <div class="kspark"><i></i><i></i><i></i><i></i></div>
    </div>
    <div class="kpi kpi4 ent">
        <div class="klabel"></div><div class="kvalue"></div>
        <div class="kspark"><i></i><i></i><i></i><i></i></div>
    </div>

    <!-- dynamic table -->
    <div class="table ent">
        <div class="thead">
            <span class="cb"></span>
            <span class="cell cc1"></span><span class="sort"></span>
            <span class="cell cc2"></span>
            <span class="cell cc3"></span>
            <span class="cell cc4"></span>
        </div>
        <div class="trow">
            <span class="cb on"></span>
            <span class="cell cc1"></span><span class="ava"></span><span class="cell cc2"></span>
            <span class="pill"></span><span class="prog" style="--p:72%"></span>
            <span class="act"></span><span class="act2"></span>
        </div>
        <div class="trow">
            <span class="cb"></span>
            <span class="cell cc1"></span><span class="ava"></span><span class="cell cc2"></span>
            <span class="pill grey"></span><span class="prog" style="--p:38%"></span>
            <span class="act"></span><span class="act2"></span>
        </div>
        <div class="trow">
            <span class="cb"></span>
            <span class="cell cc1"></span><span class="ava"></span><span class="cell cc2"></span>
            <span class="pill"></span><span class="prog" style="--p:56%"></span>
            <span class="act"></span><span class="act2"></span>
        </div>
        <div class="trow">
            <span class="cb"></span>
            <span class="cell cc1"></span><span class="ava"></span><span class="cell cc2"></span>
            <span class="pill grey"></span><span class="prog" style="--p:84%"></span>
