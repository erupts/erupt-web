<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            background: #fff;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            animation: fade 2s ease both;
        }
        @keyframes fade {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* soft fade at the edges so lines melt into the shell */
        .veil {
            position: fixed;
            pointer-events: none;
        }
        .veil.l { left: 0; top: 0; bottom: 0; width: 16vw;
                  background: linear-gradient(90deg, #fff, transparent); }
        .veil.r { right: 0; top: 0; bottom: 0; width: 16vw;
                  background: linear-gradient(-90deg, #fff, transparent); }
        .veil.t { left: 0; right: 0; top: 0; height: 22vh;
                  background: linear-gradient(180deg, #fff, transparent); }
        .veil.b { left: 0; right: 0; bottom: 0; height: 18vh;
                  background: linear-gradient(0deg, #fff, transparent); }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div class="veil l"></div>
    <div class="veil r"></div>
    <div class="veil t"></div>
    <div class="veil b"></div>

    <script>
        (function () {
            var canvas = document.getElementById("c");
            var ctx = canvas.getContext("2d");
            var W, H, dpr;

            function resize() {
                dpr = Math.min(window.devicePixelRatio || 1, 2);
                W = window.innerWidth;
                H = window.innerHeight;
                canvas.width = W * dpr;
                canvas.height = H * dpr;
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            }
            resize();
            window.addEventListener("resize", resize);

            var LINES = 26;

            function draw(t) {
                ctx.clearRect(0, 0, W, H);
                var bandTop = H * 0.34;
                var bandHeight = H * 0.42;
                var step = 6;

                for (var i = 0; i < LINES; i++) {
                    var p = i / (LINES - 1);            // 0..1 down the band
                    var baseY = bandTop + p * bandHeight;
                    // center lines swell more than the outer ones
                    var envelope = Math.sin(p * Math.PI);
                    var amp1 = 14 + 26 * envelope;
                    var amp2 = 6 + 10 * envelope;

                    var blue = (i % 6 === 3);
                    ctx.strokeStyle = blue
                        ? "rgba(22, 119, 255, " + (0.10 + 0.14 * envelope) + ")"
                        : "rgba(28, 46, 74, "  + (0.05 + 0.07 * envelope) + ")";
                    ctx.lineWidth = 1;
                    ctx.beginPath();

                    for (var x = -10; x <= W + 10; x += step) {
                        var y = baseY
                            + amp1 * Math.sin(x * 0.0028 + t * 0.00022 + i * 0.42)
                            + amp2 * Math.sin(x * 0.0061 - t * 0.00014 + i * 0.9);
                        if (x === -10) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                }
                requestAnimationFrame(draw);
            }
            requestAnimationFrame(draw);
        })();
    </script>
</body>
</html>
